# =============================================
# AuthenTick - Application Configuration
# =============================================

spring.application.name=AuthenTick

# H2 Database (Development - no MySQL install needed)
spring.datasource.url=jdbc:h2:file:./data/authentick_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (access at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server
server.port=8080

# JWT Configuration
app.jwt.secret=AuthenTickSecretKeyForJWTTokenGeneration2024SuperSecureRandomString
app.jwt.expiration=86400000

# File size limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
