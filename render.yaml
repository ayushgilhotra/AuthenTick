services:
  - type: web
    name: authentick-api
    runtime: docker
    env: docker
    rootDir: backend
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: authentick-psql
          property: host
      - key: DB_PORT
        fromDatabase:
          name: authentick-psql
          property: port
      - key: DB_NAME
        fromDatabase:
          name: authentick-psql
          property: database
      - key: DATABASE_USER
        fromDatabase:
          name: authentick-psql
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: authentick-psql
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false # Set this to your Vercel URL later

databases:
  - name: authentick-psql
    plan: free
    databaseName: authentick
    user: authentick_user
